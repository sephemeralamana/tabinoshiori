<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>迷子になろうよ、一緒に。</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f5ead4;font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;color:#5f4536}
.cover{
  position:relative;
  width:100%;
  max-width:100%;
  margin:0 auto;
  background:#f5ead4;
  min-height:auto;
  overflow:hidden;
}

.cover img{
  width:100%;
  height:auto;
  display:block;
  object-fit:contain;
}
.start{position:absolute;left:50%;top:66.5%;transform:translateX(-50%);width:56%;height:7%;border:0;border-radius:999px;background:transparent;color:transparent;z-index:5}
.hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:8;background:rgba(65,45,32,.45);color:#fff;padding:8px 14px;border-radius:999px;font-size:12px;backdrop-filter:blur(6px)}
.flip{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(255,245,220,.35);z-index:12}
.flip.show{display:flex}
.flip .paper{width:70vw;max-width:360px;height:46vh;background:#fff7e6;border:6px solid #8b6547;border-radius:20px;box-shadow:0 20px 45px rgba(0,0,0,.3);animation:bookflip 1.8s ease-in-out both}
@keyframes bookflip{0%{transform:scale(.7) rotateY(0);opacity:0}15%{opacity:1}35%{transform:scale(1) rotateY(-70deg)}55%{transform:scale(1) rotateY(55deg)}78%{transform:scale(1) rotateY(-35deg)}100%{transform:scale(.9) rotateY(0);opacity:0}}
.result{position:fixed;inset:0;z-index:20;background:rgba(42,29,22,.48);display:none;align-items:center;justify-content:center;padding:18px}
.result.show{display:flex}
.page{width:min(92vw,460px);max-height:86vh;overflow:auto;background:#fff8e8;border:8px solid #8b6547;border-radius:26px;padding:24px 20px;box-shadow:0 25px 45px rgba(0,0,0,.35);text-align:center;animation:open .45s ease both}
@keyframes open{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
.date,.pnum{font-size:13px;color:#9b7761}
.place{font-size:38px;color:#4d9dcc;margin:10px 0}
.copy{line-height:1.8;margin-bottom:18px}
.card{text-align:left;background:white;border:2px dashed #d9b982;border-radius:18px;padding:14px;margin:12px 0;line-height:1.7}
.close{margin-top:14px;border:0;border-radius:999px;background:#559fc6;color:white;font-size:17px;font-weight:bold;padding:14px 24px}
.petal{position:fixed;top:-24px;z-index:30;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.1}}
</style>
</head>
<body>

<div class="cover" id="cover">
  <img src="https://raw.githubusercontent.com/sephemeralamana/tabinoshiori/refs/heads/main/5F880833-D184-45EE-8A67-FCD5BCC16F2A.png">
</div>

<div class="hint">ボタンを押すと、今日のページが開きます</div>

<div class="flip" id="flip"><div class="paper"></div></div>

<div class="result" id="result">
  <div class="page">
    <div class="date" id="date"></div>
    <div class="place" id="place"></div>
    <div class="copy" id="copy"></div>
    <div class="card"><b>📍 今日の寄り道</b><br><span id="spot"></span></div>
    <div class="card"><b>🍞 ごほうびグルメ</b><br><span id="food"></span></div>
    <div class="card"><b>☔ 雨の日のページ</b><br><span id="rain"></span></div>
    <div class="pnum" id="pnum"></div>
    <button class="close" onclick="closeResult()">もう一度ページをめくる</button>
  </div>
</div>

<script>
const places=[
["千代田区","丸の内と皇居外苑をゆっくり散歩","神保町カレー、丸の内カフェ","KITTE・丸ビル・東京駅ギャラリー"],
["中央区","銀座、日本橋、築地場外をめぐる","築地海鮮、銀座ランチ","GINZA SIX・コレド室町"],
["港区","東京タワー、麻布台、六本木へ","麻布台カフェ、赤坂ランチ","国立新美術館・麻布台ヒルズ"],
["新宿区","新宿御苑、神楽坂、都庁展望室","新宿三丁目ごはん、神楽坂カフェ","都庁展望室・映画館"],
["文京区","根津神社、小石川後楽園、東京ドーム周辺","本郷カフェ、湯島スイーツ","東京ドームシティ・文京シビックセンター"],
["台東区","浅草、上野、谷中で寄り道","浅草食べ歩き、上野洋食","東京国立博物館・国立科学博物館"],
["墨田区","スカイツリー、ソラマチ、両国","両国ちゃんこ、ソラマチグルメ","すみだ水族館・東京ソラマチ"],
["江東区","清澄白河、豊洲、お台場方面","清澄白河カフェ、豊洲海鮮","チームラボプラネッツ・有明ガーデン"],
["品川区","天王洲アイル、戸越銀座、大井町","戸越銀座食べ歩き","アクアパーク品川"],
["目黒区","中目黒、自由が丘、目黒川","中目黒カフェ、自由が丘スイーツ","東京都写真美術館"],
["大田区","羽田空港、蒲田、洗足池","蒲田餃子、羽田空港グルメ","羽田空港ターミナル"],
["世田谷区","下北沢、三軒茶屋、二子玉川","下北カレー、三茶カフェ","二子玉川ライズ"],
["渋谷区","渋谷、原宿、代々木公園","奥渋カフェ、原宿クレープ","渋谷スクランブルスクエア"],
["中野区","中野ブロードウェイ、中野セントラルパーク","中野ラーメン、純喫茶","中野ブロードウェイ"],
["杉並区","高円寺、阿佐ヶ谷、荻窪","高円寺カフェ、荻窪ラーメン","阿佐ヶ谷パールセンター"],
["豊島区","池袋、巣鴨、雑司が谷","池袋中華、巣鴨甘味、カフェ","サンシャイン水族館"],
["北区","赤羽、王子、飛鳥山公園","赤羽せんべろ、王子カフェ","紙の博物館"],
["荒川区","日暮里、都電荒川線、谷中寄り道","町中華、日暮里カフェ","日暮里繊維街"],
["板橋区","大山商店街、赤塚、板橋宿","大山食べ歩き、町中華","板橋区立美術館"],
["練馬区","石神井公園、大泉学園、としまえん跡地周辺","江古田カフェ、大泉学園ランチ","スタジオツアー東京"],
["足立区","北千住、西新井大師、舎人公園","北千住飲み屋、ラーメン","北千住ルミネ・マルイ"],
["葛飾区","柴又、亀有、堀切菖蒲園","柴又草だんご、亀有グルメ","寅さん記念館"],
["江戸川区","葛西臨海公園、小岩、船堀","小岩グルメ、葛西カフェ","葛西臨海水族園"],
["東京23区以外","吉祥寺、立川、高尾山、調布","吉祥寺カフェ、深大寺そば","ジブリ美術館・多摩六都科学館"],
["神奈川県","横浜、鎌倉、江の島、箱根","横浜中華街、鎌倉カフェ","新江ノ島水族館"],
["埼玉県","川越、大宮、飯能、秩父","川越食べ歩き、武蔵野うどん","鉄道博物館"],
["千葉県","舞浜、幕張、成田、鴨川","成田うなぎ、海鮮","イクスピアリ・鴨川シーワールド"]
];

const d=new Date();
const week=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
document.getElementById("date").textContent =
`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${week}`;

document.getElementById("cover").onclick=()=>{
  const flip=document.getElementById("flip");
  flip.classList.remove("show");
  void flip.offsetWidth;
  flip.classList.add("show");
  petals();
  setTimeout(showResult,1800);
};

function showResult(){
  const i=Math.floor(Math.random()*places.length);
  const p=places[i];
  document.getElementById("place").textContent=p[0];
  document.getElementById("copy").textContent=`今日は、${p[0]}のページが開きました。`;
  document.getElementById("spot").textContent=p[1];
  document.getElementById("food").textContent=p[2];
  document.getElementById("rain").textContent=p[3];
  document.getElementById("pnum").textContent="P."+String(i+1).padStart(2,"0");
  document.getElementById("result").classList.add("show");
}

function closeResult(){
  document.getElementById("result").classList.remove("show");
}

function petals(){
  for(let i=0;i<36;i++){
    const e=document.createElement("span");
    e.className="petal";
    e.textContent="🌸";
    e.style.left=Math.random()*100+"vw";
    e.style.animationDuration=(2.5+Math.random()*3)+"s";
    e.style.animationDelay=Math.random()*0.5+"s";
    e.style.fontSize=(14+Math.random()*14)+"px";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),6000);
  }
}
</script>
</body>
</html>
