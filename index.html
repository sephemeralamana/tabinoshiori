<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>迷子になろうよ、一緒に。</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Hiragino Maru Gothic ProN","Yu Gothic",sans-serif;
  color:#6a4b3b;
  background:#f7edd8;
  overflow-x:hidden;
}
.app{
  min-height:100vh;
  padding:38px 18px 60px;
  text-align:center;
  background:
    radial-gradient(circle at 20% 10%,#fff6c7 0 7%,transparent 20%),
    linear-gradient(#8edcff 0%,#eaf9ff 38%,#fff1cf 72%,#e7bd8a 100%);
  position:relative;
  overflow:hidden;
}
.app:before{
  content:"";
  position:absolute;
  inset:auto 0 0 0;
  height:36vh;
  background:
    linear-gradient(135deg,transparent 0 40%,#d59b62 41% 42%,transparent 43%),
    linear-gradient(45deg,transparent 0 48%,#b98556 49% 50%,transparent 51%),
    linear-gradient(#f3d3a6,#d9a66f);
  opacity:.35;
  border-top-left-radius:45% 18%;
  border-top-right-radius:45% 18%;
}
.cloud{
  position:absolute;
  background:#fff;
  border-radius:999px;
  opacity:.78;
  filter:blur(.2px);
  animation:float 30s linear infinite;
}
.cloud:before,.cloud:after{
  content:"";
  position:absolute;
  background:#fff;
  border-radius:50%;
}
.c1{width:160px;height:50px;top:95px;left:-180px}
.c1:before{width:70px;height:70px;left:25px;top:-28px}
.c1:after{width:85px;height:85px;right:22px;top:-42px}
.c2{width:120px;height:38px;top:210px;right:-140px;animation-delay:8s}
.c2:before{width:55px;height:55px;left:18px;top:-23px}
.c2:after{width:65px;height:65px;right:12px;top:-30px}
@keyframes float{to{transform:translateX(130vw)}}

.badge{
  display:inline-block;
  background:#fff8;
  border:1px solid #d5b28a;
  border-radius:999px;
  padding:8px 16px;
  font-size:13px;
  position:relative;
  z-index:1;
}
h1{
  margin:58px auto 12px;
  font-size:clamp(38px,10vw,62px);
  line-height:1.45;
  letter-spacing:.05em;
  color:#6b4a38;
  text-shadow:0 3px 0 #fff9;
  position:relative;
  z-index:1;
}
.title span,.sub span{
  opacity:0;
  transform:translateY(8px);
  display:inline-block;
  animation:letter .45s forwards;
}
@keyframes letter{
  to{opacity:1;transform:translateY(0)}
}
.sub{
  font-size:16px;
  line-height:1.9;
  margin-bottom:24px;
  position:relative;
  z-index:1;
}
.scene{
  max-width:520px;
  margin:0 auto;
  position:relative;
  z-index:1;
}
.town{
  height:150px;
  border-radius:30px 30px 8px 8px;
  background:
    radial-gradient(circle at 18% 45%,#ffb6c1 0 3px,transparent 4px),
    radial-gradient(circle at 24% 55%,#fff6a8 0 3px,transparent 4px),
    radial-gradient(circle at 80% 42%,#ffc6d0 0 3px,transparent 4px),
    linear-gradient(90deg,#d79b63 0 18%,transparent 18% 22%,#efc08a 22% 40%,transparent 40% 58%,#d99b61 58% 76%,transparent 76%),
    linear-gradient(#cdefff,#f8d6a3);
  box-shadow:0 12px 22px #8b68443b;
  border:2px solid #fff8;
  overflow:hidden;
  position:relative;
}
.town:before{
  content:"gütiokipänja";
  position:absolute;
  left:22px;
  bottom:38px;
  background:#8a5f3d;
  color:#fff7d8;
  padding:5px 8px;
  border-radius:8px;
  font-size:12px;
  transform:rotate(-4deg);
}
.town:after{
  content:"地球屋";
  position:absolute;
  right:28px;
  bottom:42px;
  background:#6a8f7d;
  color:#fff;
  padding:5px 9px;
  border-radius:8px;
  font-size:12px;
  transform:rotate(3deg);
}
.bird{
  position:absolute;
  right:32px;
  top:18px;
  font-size:24px;
  animation:bird 3s ease-in-out infinite;
}
@keyframes bird{50%{transform:translateY(-8px)}}

.book{
  width:96%;
  max-width:480px;
  height:285px;
  margin:-20px auto 20px;
  background:#8b6a4f;
  border-radius:22px;
  padding:13px;
  box-shadow:0 18px 35px #6d4d334d;
  position:relative;
  perspective:900px;
}
.paper{
  position:absolute;
  inset:14px;
  background:#fff7e4;
  border-radius:16px;
  box-shadow:inset 0 0 22px #caa87888;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  transform-origin:left center;
}
.paper:before{
  content:"";
  position:absolute;
  top:18px;
  bottom:18px;
  left:50%;
  width:1px;
  background:#d8bb8e;
}
.paper.flip{
  animation:flip .18s ease-in-out;
}
@keyframes flip{
  0%{transform:rotateY(0)}
  50%{transform:rotateY(-70deg)}
  100%{transform:rotateY(0)}
}
.paper small{font-size:13px;color:#9a7259}
.paper h2{
  margin:12px 0 8px;
  color:#4ba3d5;
  font-size:31px;
}
.page-num{
  position:absolute;
  right:24px;
  bottom:18px;
  color:#a58368;
  font-size:13px;
}
.date-in-book{
  position:absolute;
  left:28px;
  top:22px;
  font-size:12px;
  color:#a58368;
  text-align:left;
  line-height:1.5;
}
button{
  border:0;
  border-radius:999px;
  background:#5aa9d2;
  color:white;
  font-size:19px;
  font-weight:700;
  padding:17px 28px;
  box-shadow:0 8px 0 #3e83a4,0 14px 22px #6b4b3b33;
  position:relative;
  z-index:1;
}
button:active{
  transform:translateY(4px);
  box-shadow:0 4px 0 #3e83a4;
}
.result{
  display:none;
  max-width:520px;
  margin:24px auto 0;
  background:#fffaf0e8;
  border:2px solid #e2c08d;
  border-radius:30px;
  padding:22px;
  box-shadow:0 15px 28px #7b5b3538;
  text-align:left;
  position:relative;
  z-index:1;
}
.result.show{display:block}
.result h2{
  text-align:center;
  color:#4ba3d5;
  font-size:38px;
  margin:4px 0 8px;
}
.copy{
  text-align:center;
  line-height:1.8;
  margin-bottom:18px;
}
.card{
  background:white;
  border:2px dashed #dfbf8c;
  border-radius:20px;
  padding:14px 16px;
  margin:12px 0;
  line-height:1.7;
}
.card b{color:#704f3d}
.note{
  margin:22px auto 0;
  max-width:520px;
  background:#fff8;
  border-radius:20px;
  padding:12px;
  line-height:1.8;
  font-size:13px;
  position:relative;
  z-index:1;
}
.particle{
  position:fixed;
  top:-24px;
  z-index:20;
  pointer-events:none;
  animation:fall linear forwards;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg);opacity:.15}
}
</style>
</head>
<body>
<div class="app">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>

  <div class="badge" id="seasonBadge">海の見える街</div>

  <h1 id="title"></h1>
  <div class="sub" id="subtitle"></div>

  <div class="scene">
    <div class="town"><div class="bird">🐦</div></div>

    <div class="book">
      <div class="paper" id="paper">
        <div class="date-in-book" id="dateBook"></div>
        <small>海の見える街</small>
        <h2 id="bookTitle">今日の旅日記</h2>
        <div class="page-num" id="pageNum">P.00</div>
      </div>
    </div>
  </div>

  <button id="start">📖 今日のページをめくる</button>

  <section class="result" id="result">
    <h2 id="place"></h2>
    <p class="copy" id="copy"></p>
    <div class="card"><b>📍 今日の寄り道</b><br><span id="spot"></span></div>
    <div class="card"><b>🍞 ごほうびグルメ</b><br><span id="food"></span></div>
    <div class="card"><b>☔ 雨の日のページ</b><br><span id="rain"></span></div>
  </section>

  <div class="note">
    🍞 gütiokipänja ／ ☕ 地球屋<br>
    白っぽい青の小鳥が、今日のページを運んできます。
  </div>
</div>

<script>
const titleText="迷子になろうよ、\n一緒に。";
const subText="ページをめくれば、今日の旅が始まる。";

function typeText(el,text,start=0,gap=85){
  el.innerHTML="";
  let delay=start;
  [...text].forEach(ch=>{
    const s=document.createElement("span");
    s.textContent=ch;
    s.style.whiteSpace="pre";
    s.style.animationDelay=delay+"ms";
    el.appendChild(s);
    delay += ch==="、" ? 650 : gap;
  });
}
typeText(document.getElementById("title"),titleText,250,95);
typeText(document.getElementById("subtitle"),subText,2500,45);

const d=new Date();
const dateStr=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
const week=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
document.getElementById("dateBook").innerHTML=`今日の<br>旅日記<br>${dateStr} ${week}`;

const month=d.getMonth()+1;
let season="spring", particle="🌸", badge="春のページ";
if([6,7,8].includes(month)){season="summer";particle="🫧";badge="夏のページ"}
if([9,10,11].includes(month)){season="autumn";particle="🍂";badge="秋のページ"}
if([12,1,2].includes(month)){season="winter";particle="❄️";badge="冬のページ"}
document.getElementById("seasonBadge").textContent=`海の見える街・${badge}`;

const places=[
["千代田区","丸の内と皇居外苑をゆっくり散歩","神保町カレー、丸の内カフェ","KITTE・丸ビル・東京駅ギャラリー"],
["中央区","銀座、日本橋、築地場外をめぐる","築地海鮮、銀座ランチ","GINZA SIX・コレド室町"],
["港区","東京タワー、麻布台、六本木へ","麻布台カフェ、赤坂ランチ","国立新美術館・麻布台ヒルズ"],
["新宿区","新宿御苑、神楽坂、都庁展望室","新宿三丁目ごはん、神楽坂カフェ","都庁展望室・映画館"],
["文京区","根津神社、小石川後楽園、東京ドーム周辺","本郷カフェ、湯島スイーツ","東京ドームシティ・文京シビックセンター"],
["台東区","浅草、上野、谷中で寄り道","浅草食べ歩き、上野洋食","東京国立博物館・国立科学博物館"],
["墨田区","スカイツリー、ソラマチ、両国","両国ちゃんこ、ソラマチグルメ","すみだ水族館・東京ソラマチ"],
["江東区","清澄白河、豊洲、お台場方面","清澄白河カフェ、豊洲海鮮","チームラボプラネッツ・有明ガーデン"],
["品川区","天王洲アイル、戸越銀座、大井町","戸越銀座食べ歩き","アクアパーク品川"],
["目黒区","中目黒、自由が丘、目黒川","中目黒カフェ、自由が丘スイーツ","東京都写真美術館"],
["大田区","羽田空港、蒲田、洗足池","蒲田餃子、羽田空港グルメ","羽田空港ターミナル"],
["世田谷区","下北沢、三軒茶屋、二子玉川","下北カレー、三茶カフェ","二子玉川ライズ"],
["渋谷区","渋谷、原宿、代々木公園","奥渋カフェ、原宿クレープ","渋谷スクランブルスクエア"],
["中野区","中野ブロードウェイ、中野セントラルパーク","中野ラーメン、純喫茶","中野ブロードウェイ"],
["杉並区","高円寺、阿佐ヶ谷、荻窪","高円寺カフェ、荻窪ラーメン","阿佐ヶ谷パールセンター"],
["豊島区","池袋、巣鴨、雑司が谷","池袋中華、巣鴨甘味、カフェ","サンシャイン水族館"],
["北区","赤羽、王子、飛鳥山公園","赤羽せんべろ、王子カフェ","紙の博物館"],
["荒川区","日暮里、都電荒川線、谷中寄り道","町中華、日暮里カフェ","日暮里繊維街"],
["板橋区","大山商店街、赤塚、板橋宿","大山食べ歩き、町中華","板橋区立美術館"],
["練馬区","石神井公園、大泉学園、としまえん跡地周辺","江古田カフェ、大泉学園ランチ","スタジオツアー東京"],
["足立区","北千住、西新井大師、舎人公園","北千住飲み屋、ラーメン","北千住ルミネ・マルイ"],
["葛飾区","柴又、亀有、堀切菖蒲園","柴又草だんご、亀有グルメ","寅さん記念館"],
["江戸川区","葛西臨海公園、小岩、船堀","小岩グルメ、葛西カフェ","葛西臨海水族園"],
["東京23区以外","吉祥寺、立川、高尾山、調布","吉祥寺カフェ、深大寺そば","ジブリ美術館・多摩六都科学館"],
["神奈川県","横浜、鎌倉、江の島、箱根","横浜中華街、鎌倉カフェ","新江ノ島水族館"],
["埼玉県","川越、大宮、飯能、秩父","川越食べ歩き、武蔵野うどん","鉄道博物館"],
["千葉県","舞浜、幕張、成田、鴨川","成田うなぎ、海鮮","イクスピアリ・鴨川シーワールド"]
];

const paper=document.getElementById("paper");
const pageNum=document.getElementById("pageNum");
const bookTitle=document.getElementById("bookTitle");

document.getElementById("start").onclick=()=>{
  document.getElementById("result").classList.remove("show");
  bookTitle.textContent="ページを探しています";
  let count=0;
  const max=18+Math.floor(Math.random()*12);
  const timer=setInterval(()=>{
    paper.classList.add("flip");
    setTimeout(()=>paper.classList.remove("flip"),110);
    const n=Math.floor(Math.random()*27)+1;
    pageNum.textContent="P."+String(n).padStart(2,"0");
    count++;
    if(count>=max){
      clearInterval(timer);
      const i=Math.floor(Math.random()*places.length);
      const p=places[i];
      pageNum.textContent="P."+String(i+1).padStart(2,"0");
      bookTitle.textContent=p[0];
      document.getElementById("place").textContent=p[0];
      document.getElementById("copy").textContent=`今日は、${p[0]}のページが開きました。`;
      document.getElementById("spot").textContent=p[1];
      document.getElementById("food").textContent=p[2];
      document.getElementById("rain").textContent=p[3];
      document.getElementById("result").classList.add("show");
      particles();
    }
  },125);
};

function particles(){
  for(let i=0;i<45;i++){
    const e=document.createElement("div");
    e.className="particle";
    e.textContent=particle;
    e.style.left=Math.random()*100+"vw";
    e.style.animationDuration=(2.5+Math.random()*3)+"s";
    e.style.animationDelay=Math.random()*0.6+"s";
    e.style.fontSize=(14+Math.random()*14)+"px";
    document.body.appendChild(e);
    setTimeout(()=>e.remove(),6000);
  }
}
</script>
</body>
</html>
